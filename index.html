<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touched By HexaVoid_77</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        html {
            overflow-y: scroll;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            will-change: transform;
            contain: content;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: 
                #000 
                url('https://c.tenor.com/A8qRjWyvEZMAAAAC/tenor.gif') 
                no-repeat 
                center center / cover;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0.85);
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 255, 0.02) 50%
            );
            background-size: 100% 8px;
            pointer-events: none;
            z-index: 1;
            will-change: background-position;
            animation: scan 12s linear infinite;
        }

        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100vh; }
        }

        .crt::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                rgba(0, 0, 0, 0.4) 70%,
                rgba(0, 0, 0, 0.8) 100%
            );
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: multiply;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 4;
            padding: 20px;
            max-width: 90vw;
            contain: layout style;
        }

        .glitch-text {
            position: relative;
            color: #fff;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 
                0.05em 0 0 rgba(255, 0, 0, 0.75),
                -0.025em -0.05em 0 rgba(0, 255, 255, 0.75),
                0.025em 0.05em 0 rgba(0, 255, 0, 0.75);
            animation: glitch 3s steps(10) infinite;
            transform: translate3d(0,0,0);
        }

        @keyframes glitch {
            0%, 90% { 
                text-shadow: 
                    0.05em 0 0 rgba(255, 0, 0, 0.75),
                    -0.025em -0.05em 0 rgba(0, 255, 255, 0.75),
                    0.025em 0.05em 0 rgba(0, 255, 0, 0.75);
            }
            91%, 93% {
                text-shadow: 
                    -0.05em -0.025em 0 rgba(255, 0, 0, 0.75),
                    0.025em 0.025em 0 rgba(0, 255, 255, 0.75),
                    -0.05em -0.05em 0 rgba(0, 255, 0, 0.75);
            }
            94%, 96% {
                text-shadow: 
                    0.025em 0.05em 0 rgba(255, 0, 0, 0.75),
                    0.05em 0 0 rgba(0, 255, 255, 0.75),
                    0 -0.05em 0 rgba(0, 255, 0, 0.75);
            }
            97%, 100% {
                text-shadow: 
                    -0.025em 0 0 rgba(255, 0, 0, 0.75),
                    -0.025em -0.025em 0 rgba(0, 255, 255, 0.75),
                    -0.025em -0.05em 0 rgba(0, 255, 0, 0.75);
            }
        }

        .gif-container {
            margin: 20px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .gif-frame {
            width: min(300px, 75vw); 
            height: min(180px, 45vw); 
            margin: 0 auto;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(255, 0, 0, 0.4),
                inset 0 0 15px rgba(255, 0, 0, 0.15);
            border: 2px solid rgba(255, 0, 0, 0.5);
            animation: borderPulse 4s ease-in-out infinite;
            transform: translate3d(0,0,0);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes borderPulse {
            0%, 100% { 
                border-color: rgba(255, 0, 0, 0.5);
                box-shadow: 
                    0 0 20px rgba(255, 0, 0, 0.4),
                    inset 0 0 15px rgba(255, 0, 0, 0.15);
            }
            50% { 
                border-color: rgba(0, 255, 255, 0.5);
                box-shadow: 
                    0 0 25px rgba(0, 255, 255, 0.4),
                    inset 0 0 15px rgba(0, 255, 255, 0.15);
            }
        }

        .anime-gif {
            width: 120%; 
            height: 120%;
            object-fit: cover;
            object-position: center center; 
            filter: contrast(1.05) saturate(1.1);
            -webkit-user-drag: none;
            user-select: none;
            loading: lazy;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .quote {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            color: #ccc;
            margin: 20px auto;
            max-width: min(500px, 90vw);
            line-height: 1.5;
            padding: 15px;
            border-left: 3px solid #ff0000;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(3px);
            animation: fadeIn 2s ease-out;
            contain: content;
        }

        .signature {
            margin-top: 30px;
            position: relative;
        }

        .hacker-name {
            font-size: clamp(2rem, 6vw, 3.5rem);
            background: linear-gradient(90deg, 
                #ff0000, #ff3366, #ff6699, 
                #00ffff, #00ccff, #0099ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 6s ease infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transform: translate3d(0,0,0);
            will-change: background-position;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .signature-subtext {
            color: #888;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 8px;
            animation: fadeIn 3s ease-out;
        }

        .code-particle {
            position: fixed;
            color: rgba(255, 100, 100, 0.4);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            pointer-events: none;
            z-index: 3;
            transform: translate3d(0,0,0);
            will-change: transform, opacity;
            contain: layout style paint;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.4;
            }
            95% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100px) rotate(180deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .gif-frame {
                width: min(280px, 70vw);
                height: min(168px, 42vw);
            }
        }

        @media (max-width: 480px) {
            .scanlines {
                background-size: 100% 12px;
                animation-duration: 15s;
            }
            
            .gif-frame {
                width: min(260px, 85vw);
                height: min(156px, 51vw);
            }
            
            .anime-gif {
                width: 130%; 
                height: 130%;
            }
            
            .glitch-text {
                letter-spacing: 1px;
                margin-bottom: 10px;
            }
        }

        @media (max-height: 700px) {
            .gif-frame {
                width: min(250px, 65vw);
                height: min(150px, 39vw);
                margin: 15px auto;
            }
            
            .anime-gif {
                width: 125%;
                height: 125%;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="crt">
    <!-- Background -->
    <div class="animated-bg"></div>
    <div class="scanlines"></div>

    <div class="container">
        <div class="main-content">
            <h1 class="glitch-text">TOUCHED BY HexaVoid_77</h1>
            
            <div class="gif-container">
                <div class="gif-frame">
                    <img src="https://c.tenor.com/kFe-oEFAmU8AAAAC/tenor.gif" 
                         alt="Lelouch" 
                         class="anime-gif"
                         decoding="async">
                </div>
            </div>
            
            <div class="quote">
                || Every vulnerability has a story, I just here to read it ||
            </div>
        </div>

        <div class="signature">
            <div class="hacker-name">Code Geass</div>
            <div class="signature-subtext">Zero Requiem</div>
        </div>
    </div>

    <script>
        
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function ensureGifCentering() {
            const gif = document.querySelector('.anime-gif');
            if (gif) {
                gif.onload = function() {
                    this.style.objectPosition = 'center center';
                    this.style.left = '50%';
                    this.style.top = '50%';
                    this.style.transform = 'translate(-50%, -50%)';
                };
                
                if (gif.complete) {
                    gif.style.objectPosition = 'center center';
                    gif.style.left = '50%';
                    gif.style.top = '50%';
                    gif.style.transform = 'translate(-50%, -50%)';
                }
            }
        }

        function createCodeParticles() {
            const particles = ['{ }', '</>', '0x', '#', '&', '*', ';', '()', '[]', '||'];
            const container = document.body;
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'code-particle';
                particle.textContent = particles[Math.floor(Math.random() * particles.length)];
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                particle.style.fontSize = (Math.random() * 8 + 8) + 'px';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationName = 'floatUp';
                
                fragment.appendChild(particle);
            }
            
            container.appendChild(fragment);
        }

        function createLightParticles() {
            const particleCount = 30;
            const container = document.body;
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: fixed;
                    width: ${Math.random() * 3 + 1}px;
                    height: ${Math.random() * 3 + 1}px;
                    background: rgba(${Math.random() * 100 + 155}, 
                                    ${Math.random() * 50}, 
                                    ${Math.random() * 100 + 155}, 0.1);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 0;
                    left: ${Math.random() * 100}vw;
                    top: ${Math.random() * 100}vh;
                    animation: drift ${Math.random() * 20 + 20}s linear infinite;
                `;
                
                fragment.appendChild(particle);
            }
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes drift {
                    0% { transform: translate(0, 0); }
                    25% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px); }
                    50% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px); }
                    75% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px); }
                    100% { transform: translate(0, 0); }
                }
            `;
            document.head.appendChild(style);
            
            container.appendChild(fragment);
        }

        function createMouseTrail() {
            const trail = [];
            const trailLength = 8;
            
            const onMouseMove = debounce((e) => {
                const dot = document.createElement('div');
                dot.style.cssText = `
                    position: fixed;
                    left: ${e.clientX}px;
                    top: ${e.clientY}px;
                    width: 4px;
                    height: 4px;
                    background: rgba(255, 0, 0, 0.3);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 4;
                    transform: translate(-50%, -50%);
                    transition: opacity 0.3s;
                `;
                
                document.body.appendChild(dot);
                trail.push(dot);
                
                if (trail.length > trailLength) {
                    const oldDot = trail.shift();
                    oldDot.style.opacity = '0';
                    setTimeout(() => oldDot.remove(), 300);
                }
            }, 16);
            
            document.addEventListener('mousemove', onMouseMove);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Pastikan GIF centered pertama kali
            ensureGifCentering();
            
            createCodeParticles();
            
            setTimeout(() => {
                createLightParticles();
                createMouseTrail();
            }, 1000);
            
            const gifFrame = document.querySelector('.gif-frame');
            if (gifFrame) {
                gifFrame.addEventListener('click', () => {
                    const colors = ['#ff0000', '#00ffff', '#00ff00'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    gifFrame.style.transition = 'box-shadow 0.3s';
                    gifFrame.style.boxShadow = 
                        `0 0 30px ${randomColor}, inset 0 0 20px ${randomColor}`;
                    
                    setTimeout(() => {
                        gifFrame.style.boxShadow = '';
                    }, 300);
                });
            }
            
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    const hackerName = document.querySelector('.hacker-name');
                    if (hackerName) {
                        hackerName.style.animationDuration = '0.5s';
                        setTimeout(() => {
                            hackerName.style.animationDuration = '6s';
                        }, 500);
                    }
                }
            });
            
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    document.querySelectorAll('*').forEach(el => {
                        if (el.style.animationDuration) {
                            el.style.animationPlayState = 'paused';
                        }
                    });
                } else {
                    document.querySelectorAll('*').forEach(el => {
                        if (el.style.animationDuration) {
                            el.style.animationPlayState = 'running';
                        }
                    });
                }
            });
            
            window.addEventListener('resize', debounce(() => {
                ensureGifCentering();
            }, 250));
        });
        
        window.addEventListener('load', ensureGifCentering);
    </script>
</body>
</html>
